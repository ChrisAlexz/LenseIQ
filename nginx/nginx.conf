events {}

http {
  # Large uploads (sports videos can be a few hundred MB).
  client_max_body_size 2G;

  # Common proxy headers for all upstreams.
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # ── HTTP (port 80) ──
  # Serves the ACME (Let's Encrypt) challenge, redirects everything else to HTTPS.
  server {
    listen 80;
    server_name lenseiq.app www.lenseiq.app;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS (port 443) ──
  server {
    listen 443 ssl;
    server_name lenseiq.app www.lenseiq.app;

    ssl_certificate     /etc/letsencrypt/live/lenseiq.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lenseiq.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Backend API. Long timeout + no buffering so the SSE progress stream
    # (/api/progress) and long video processing work.
    location /api/ {
      proxy_pass http://backend:8001;
      proxy_read_timeout 3600s;
      proxy_buffering off;
    }

    location /auth/ {
      proxy_pass http://backend:8001;
    }

    location /clips/ {
      proxy_pass http://backend:8001;
    }

    # Everything else → Next.js frontend.
    location / {
      proxy_pass http://frontend:3000;
    }
  }
}
